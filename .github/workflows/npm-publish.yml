name: Publish to npm

# Fires when a GitHub release is published. release-please creates
# the release via a GitHub-App-issued token (see release-please.yml),
# so the `release: published` event is delivered to this workflow.
# (The default GITHUB_TOKEN would silently drop the event under
# GitHub's loop-prevention rules.)
#
# `workflow_dispatch` is kept as a manual escape hatch — pass a
# `tag` input (e.g. `v0.3.0`) to publish a tag that already exists.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.3.0). Must already exist.'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Resolve tag
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.tag }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Strip link overrides for CI
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          if (pkg.pnpm?.overrides) {
            for (const k of Object.keys(pkg.pnpm.overrides))
              if (pkg.pnpm.overrides[k].startsWith('link:')) delete pkg.pnpm.overrides[k];
            if (!Object.keys(pkg.pnpm.overrides).length) delete pkg.pnpm.overrides;
            if (pkg.pnpm && !Object.keys(pkg.pnpm).length) delete pkg.pnpm;
          }
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          node -e "
          const fs = require('fs');
          const ws = 'pnpm-workspace.yaml';
          if (fs.existsSync(ws)) {
            let y = fs.readFileSync(ws, 'utf8');
            y = y.replace(/^overrides:\n(  [^\n]*\n)*/m, '');
            fs.writeFileSync(ws, y);
          }
          "
          rm -f pnpm-lock.yaml

      - run: pnpm install

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      - name: Determine npm dist-tag
        id: distTag
        run: |
          VERSION="${{ steps.ref.outputs.version }}"
          if [[ "$VERSION" == *"-alpha"* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          elif [[ "$VERSION" == *"-beta"* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      # Trusted Publisher auth — no NPM_TOKEN needed. `actions/setup-node`
      # exchanges the workflow's OIDC token (id-token: write) for an npm
      # publish token at the moment of `npm publish`, provided the package
      # has a trusted publisher configured pointing at this repo + workflow.
      # See https://www.npmjs.com/package/@courthive/provider-config (Settings).
      - run: npm publish --provenance --access public --tag ${{ steps.distTag.outputs.tag }}
